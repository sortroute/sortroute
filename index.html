<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sortroute</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-gray-900 p-4">
    <h1 class="text-2xl font-bold mb-4">Smartwatches</h1>
    <div id="product-list" class="grid gap-4 sm:grid-cols-2 md:grid-cols-3"></div>

    <script>
      fetch('data/smartwatches.json')
        .then((res) => res.json())
        .then((products) => {
          const container = document.getElementById('product-list');
          products.forEach((p) => {
            container.innerHTML += `
              <a href="${p.link}" target="_blank" class="block border rounded-xl p-4 shadow hover:shadow-lg transition">
                <img src="${p.image}" alt="${p.title}" class="w-full h-48 object-contain mb-2">
                <h2 class="text-lg font-semibold">${p.title}</h2>
                <p class="text-sm text-gray-600">${p.description}</p>
              </a>
            `;
          });
        });
    </script>
  </body>
</html>
