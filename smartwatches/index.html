<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smartwatches</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-black font-sans p-4">
    <main id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto"></main>

    <script src="../config.js"></script>
    <script>
      fetch('../data/smartwatches.json')
        .then(res => res.json())
        .then(products => {
          const container = document.getElementById('product-list');
          products.forEach(p => {
            const card = document.createElement('div');
            card.className = "border border-gray-200 p-4 flex flex-col items-center text-center";
            card.innerHTML = `
              <img src="${p.image}" alt="${p.title}" class="w-full h-auto mb-3" />
              <h2 class="text-base font-medium mb-2">${p.title}</h2>
              <a href="${p.url}" target="_blank" rel="noopener" class="inline-block mt-auto px-4 py-2 bg-black text-white text-sm font-medium hover:bg-gray-800 transition">
                View on Amazon
              </a>
            `;
            container.appendChild(card);
          });
        });
    </script>
  </body>
</html>
